{% extends "vendor/base.html" %}
{% block title %}Edit {{ product.name }} — ThreadVerse Vendor{% endblock %}
{% block vendor_content %}
<div class="vendor-header"><h1>Edit Product</h1></div>
{% if error %}
<div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius);padding:12px 16px;color:var(--danger);font-size:0.88rem;margin-bottom:20px">{{ error }}</div>
{% endif %}
<form method="POST" style="max-width:640px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/><input class="form-control" name="name" required value="{{ product.name }}"/></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="form-group"><label class="form-label">Price (Rs)</label><input class="form-control" name="price" type="number" step="0.01" value="{{ product.price }}"/></div>
    <div class="form-group"><label class="form-label">Stock</label><input class="form-control" name="stock" type="number" value="{{ product.stock }}"/></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="form-group"><label class="form-label">Category</label><input class="form-control" name="category" value="{{ product.category }}"/></div>
    <div class="form-group"><label class="form-label">Subcategory</label><input class="form-control" name="subcategory" value="{{ product.subcategory }}"/></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="form-group"><label class="form-label">Gender</label>
      <select class="form-control" name="gender">
        <option value="unisex" {{ 'selected' if product.gender=='unisex' }}>Unisex</option>
        <option value="men" {{ 'selected' if product.gender=='men' }}>Men</option>
        <option value="women" {{ 'selected' if product.gender=='women' }}>Women</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Color</label><input class="form-control" name="color" value="{{ product.color }}"/></div>
  </div>
  <div class="form-group"><label class="form-label">Image URL</label><input class="form-control" name="image_url" value="{{ product.image }}" placeholder="https://images.unsplash.com/..."/></div>
  <div class="form-group"><label class="form-label">Sizes</label><input class="form-control" name="sizes" value="{{ product.sizes|join(', ') }}"/></div>
  <div class="form-group"><label class="form-label">Tags</label><input class="form-control" name="tags" value="{{ product.tags|join(', ') }}"/></div>
  <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="3" style="resize:vertical">{{ product.description }}</textarea></div>
  <div class="form-group"><label class="form-label">Emoji</label><input class="form-control" name="emoji" value="{{ product.emoji }}" maxlength="4"/></div>
  <button type="submit" class="btn btn-accent btn-full btn-lg">Save Changes</button>
</form>
{% endblock %}
